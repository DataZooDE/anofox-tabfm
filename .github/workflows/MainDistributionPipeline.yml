#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-v1_5_4-build:
    name: Build extension binaries (v1.5.4, cpu flavor)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5-variegata
      extension_name: anofox_tabfm
      # ONNX Runtime comes from the prebuilt release archive by default
      # (cmake/ort.cmake); enable the "ort-vcpkg" manifest feature to build the
      # vcpkg port instead (S05 decision: both paths wired, prebuilt default).
      # Exclude WASM/musl (NFR-C1: explicitly out — ORT + multi-GB inference),
      # MinGW (vcpkg OpenSSL build issues, house pattern).
      exclude_archs: wasm_mvp;wasm_eh;wasm_threads;windows_amd64_mingw;linux_amd64_musl

  duckdb-v1_5_4-deploy:
    name: Deploy extension binaries (v1.5.4)
    needs: duckdb-v1_5_4-build
    uses: ./.github/workflows/_extension_deploy.yml
    secrets: inherit
    with:
      duckdb_version: v1.5.4
      extension_name: anofox_tabfm
      exclude_archs: wasm_mvp;wasm_eh;wasm_threads;windows_amd64_mingw;linux_amd64_musl
      deploy_latest: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
      deploy_versioned: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
